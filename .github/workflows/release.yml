name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  vscode:
    name: VSCode Extension Release
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: vscode

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: vscode/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Extract version from tag
        id: get_version
        run: |
          TAG=${{ github.ref_name }}
          VERSION=${TAG#v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Update package.json version
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          CURRENT=$(node -p "require('./package.json').version")
          if [ "$VERSION" = "$CURRENT" ]; then
            echo "package.json already at version $VERSION, skipping npm version"
          else
            npm version "$VERSION" --git-tag-version=false
            echo "Updated package.json to version: $VERSION"
          fi

      - name: Commit version changes
        run: |
          git add package.json package-lock.json
          if git diff --cached --quiet; then
            echo "No version changes to commit"
          else
            git commit -m "chore: bump version to ${{ steps.get_version.outputs.VERSION }}"
          fi

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Compile extension
        run: npm run compile

      - name: Extract release notes from CHANGELOG
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          awk -v ver="[$VERSION]" '
            $0 ~ "^## " ver { capture=1; next }
            capture && $0 ~ "^## \[" { exit }
            capture { print }
          ' CHANGELOG.md > .github-release-notes.md

          if [ ! -s .github-release-notes.md ]; then
            echo "No release notes found for version $VERSION in CHANGELOG.md"
            echo "Release $VERSION" > .github-release-notes.md
          fi

          echo "--- Release Notes ---"
          cat .github-release-notes.md
          echo "---"

      - name: Package VSIX
        run: vsce package
        continue-on-error: false

      - name: Get VSIX filename
        id: get_filename
        run: |
          VSIX_FILE=$(ls *.vsix)
          echo "VSIX_FILE=$VSIX_FILE" >> $GITHUB_OUTPUT
          echo "VSIX filename: $VSIX_FILE"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-extension-release
          path: vscode/${{ steps.get_filename.outputs.VSIX_FILE }}
          retention-days: 90

      - name: Publish to VSCode Marketplace
        if: env.SKIP_PUBLISH != 'true'
        run: |
          vsce publish -p ${{ secrets.VSCE_PAT }}
        env:
          SKIP_PUBLISH: ${{ secrets.VSCE_PAT == '' && 'true' || 'false' }}

      - name: Install OVSX
        if: env.SKIP_PUBLISH != 'true'
        run: npm install -g ovsx
        env:
          SKIP_PUBLISH: ${{ secrets.OPENVSX_PAT == '' && 'true' || 'false' }}

      - name: Publish to Open VSX
        if: env.SKIP_PUBLISH != 'true'
        run: |
          ovsx publish -p ${{ secrets.OPENVSX_PAT }}
        env:
          SKIP_PUBLISH: ${{ secrets.OPENVSX_PAT == '' && 'true' || 'false' }}

      - name: Push version changes to main
        run: |
          git fetch origin main
          git rebase origin/main || git rebase --abort
          git push origin HEAD:main

    outputs:
      vsix_file: ${{ steps.get_filename.outputs.VSIX_FILE }}
      version: ${{ steps.get_version.outputs.VERSION }}

  browser:
    name: Browser Extension Release
    runs-on: ubuntu-latest
    needs: vscode

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Package Chrome extension
        run: |
          VERSION="${{ needs.vscode.outputs.version }}"
          cd browser/chrome
          zip -r ../../ai-quota-cookie-bridge-chrome-v${VERSION}.zip manifest.json api/ scripts/ popup.html dashboard.html dashboard.js icons/

      - name: Package Firefox extension
        run: |
          VERSION="${{ needs.vscode.outputs.version }}"
          cd browser/firefox
          zip -r ../../ai-quota-cookie-bridge-firefox-v${VERSION}.zip manifest.json api/ scripts/ popup.html dashboard.html dashboard.js icons/

      - name: Upload Chrome artifact
        uses: actions/upload-artifact@v4
        with:
          name: browser-extension-chrome-release
          path: ai-quota-cookie-bridge-chrome-v*.zip
          retention-days: 90

      - name: Upload Firefox artifact
        uses: actions/upload-artifact@v4
        with:
          name: browser-extension-firefox-release
          path: ai-quota-cookie-bridge-firefox-v*.zip
          retention-days: 90

    outputs:
      chrome_file: ai-quota-cookie-bridge-chrome-v${{ needs.vscode.outputs.version }}.zip
      firefox_file: ai-quota-cookie-bridge-firefox-v${{ needs.vscode.outputs.version }}.zip

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [vscode, browser]

    steps:
      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: vscode-extension-release
          path: ./artifacts/

      - name: Download Chrome artifact
        uses: actions/download-artifact@v4
        with:
          name: browser-extension-chrome-release
          path: ./artifacts/

      - name: Download Firefox artifact
        uses: actions/download-artifact@v4
        with:
          name: browser-extension-firefox-release
          path: ./artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release summary
        run: |
          echo "##  Release ${{ needs.vscode.outputs.version }} Published!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### VSCode Extension" >> $GITHUB_STEP_SUMMARY
          echo "- **VSIX**: ${{ needs.vscode.outputs.vsix_file }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Browser Extensions" >> $GITHUB_STEP_SUMMARY
          echo "- **Chrome/Edge**: ${{ needs.browser.outputs.chrome_file }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Firefox**: ${{ needs.browser.outputs.firefox_file }}" >> $GITHUB_STEP_SUMMARY
