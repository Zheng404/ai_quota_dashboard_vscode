name: CI Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Test Version
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Compile
        run: npm run compile

      - name: Test
        run: npm test

      - name: Security audit
        run: npm audit --audit-level=high --omit=dev
        continue-on-error: true

      - name: Get build info
        id: build_info
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          SHORT_SHA=$(git rev-parse --short HEAD)
          EXT_NAME=$(node -p "require('./package.json').name")
          echo "CURRENT_VERSION=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "EXT_NAME=$EXT_NAME" >> $GITHUB_OUTPUT
          echo "Version: $CURRENT_VERSION"
          echo "Short SHA: $SHORT_SHA"
          echo "Extension name: $EXT_NAME"

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Package VSIX with SHA suffix
        run: |
          VSIX_FILENAME="${{ steps.build_info.outputs.EXT_NAME }}-${{ steps.build_info.outputs.SHORT_SHA }}.vsix"
          vsce package --out "$VSIX_FILENAME"
          echo "VSIX_FILE=$VSIX_FILENAME" >> $GITHUB_ENV
          echo "Packaged: $VSIX_FILENAME"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-extension-test-${{ steps.build_info.outputs.SHORT_SHA }}
          path: ${{ env.VSIX_FILE }}
          retention-days: 7

      - name: Build summary
        run: |
          echo "##  Test Build Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ steps.build_info.outputs.CURRENT_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit SHA**: ${{ steps.build_info.outputs.SHORT_SHA }}" >> $GITHUB_STEP_SUMMARY
          echo "- **VSIX**: ${{ env.VSIX_FILE }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "###  Note" >> $GITHUB_STEP_SUMMARY
          echo "This is a test build. The VSIX filename includes the commit SHA for identification." >> $GITHUB_STEP_SUMMARY
          echo "The extension version remains unchanged from package.json." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download the VSIX from the Artifacts section below." >> $GITHUB_STEP_SUMMARY
