name: CI Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  vscode:
    name: VSCode Extension
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: vscode

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: vscode/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Compile
        run: npm run compile

      - name: Test
        run: npm test

      - name: Security audit
        run: npm audit --audit-level=high --omit=dev
        continue-on-error: true

      - name: Get build info
        id: build_info
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          SHORT_SHA=$(git rev-parse --short HEAD)
          EXT_NAME=$(node -p "require('./package.json').name")
          echo "CURRENT_VERSION=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "EXT_NAME=$EXT_NAME" >> $GITHUB_OUTPUT
          echo "Version: $CURRENT_VERSION"
          echo "Short SHA: $SHORT_SHA"
          echo "Extension name: $EXT_NAME"

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Package VSIX with SHA suffix
        run: |
          VSIX_FILENAME="${{ steps.build_info.outputs.EXT_NAME }}-${{ steps.build_info.outputs.SHORT_SHA }}.vsix"
          vsce package --out "$VSIX_FILENAME"
          echo "VSIX_FILE=$VSIX_FILENAME" >> $GITHUB_ENV
          echo "Packaged: $VSIX_FILENAME"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-extension-test-${{ steps.build_info.outputs.SHORT_SHA }}
          path: vscode/${{ env.VSIX_FILE }}
          retention-days: 7

      - name: Build summary
        run: |
          echo "##  VSCode Extension Build Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ steps.build_info.outputs.CURRENT_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit SHA**: ${{ steps.build_info.outputs.SHORT_SHA }}" >> $GITHUB_STEP_SUMMARY
          echo "- **VSIX**: ${{ env.VSIX_FILE }}" >> $GITHUB_STEP_SUMMARY

  browser:
    name: Browser Extension
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Chrome manifest
        run: |
          python3 -c "import json; json.load(open('chrome/manifest.json')); print('Chrome manifest valid')"

      - name: Validate Firefox manifest
        run: |
          python3 -c "import json; json.load(open('firefox/manifest.json')); print('Firefox manifest valid')"

      - name: Package Chrome extension
        run: |
          cd chrome
          zip -r ../ai-quota-cookie-bridge-chrome-${{ github.sha }}.zip manifest.json api/ scripts/ popup.html dashboard.html dashboard.js icons/

      - name: Package Firefox extension
        run: |
          cd firefox
          zip -r ../ai-quota-cookie-bridge-firefox-${{ github.sha }}.zip manifest.json api/ scripts/ popup.html dashboard.html dashboard.js icons/

      - name: Upload Chrome artifact
        uses: actions/upload-artifact@v4
        with:
          name: browser-extension-chrome-${{ github.sha }}
          path: ai-quota-cookie-bridge-chrome-${{ github.sha }}.zip
          retention-days: 7

      - name: Upload Firefox artifact
        uses: actions/upload-artifact@v4
        with:
          name: browser-extension-firefox-${{ github.sha }}
          path: ai-quota-cookie-bridge-firefox-${{ github.sha }}.zip
          retention-days: 7

      - name: Build summary
        run: |
          echo "##  Browser Extension Build Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Chrome**: ai-quota-cookie-bridge-chrome-${{ github.sha }}.zip" >> $GITHUB_STEP_SUMMARY
          echo "- **Firefox**: ai-quota-cookie-bridge-firefox-${{ github.sha }}.zip" >> $GITHUB_STEP_SUMMARY
