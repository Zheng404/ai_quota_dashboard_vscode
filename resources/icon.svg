<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- 背景 -->
  <rect width="128" height="128" rx="24" fill="url(#bg)"/>

  <!-- 渐变定义 -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="pulse" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4aa"/>
      <stop offset="100%" stop-color="#00b4d8"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 网格背景装饰 -->
  <g stroke="#2a2a4a" stroke-width="1" opacity="0.5">
    <line x1="0" y1="32" x2="128" y2="32"/>
    <line x1="0" y1="64" x2="128" y2="64"/>
    <line x1="0" y1="96" x2="128" y2="96"/>
    <line x1="32" y1="0" x2="32" y2="128"/>
    <line x1="64" y1="0" x2="64" y2="128"/>
    <line x1="96" y1="0" x2="96" y2="128"/>
  </g>

  <!-- 脉冲波形 -->
  <g filter="url(#glow)">
    <!-- 背景脉冲（较淡） -->
    <polyline points="16,64 36,64 44,36 52,92 60,64 72,64 80,48 88,80 96,64 112,64"
              fill="none" stroke="url(#pulse)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.3"/>

    <!-- 主脉冲 -->
    <polyline points="16,64 36,64 44,30 52,98 60,64 72,64 80,44 88,84 96,64 112,64"
              fill="none" stroke="url(#pulse)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- 脉冲节点 -->
  <circle cx="44" cy="30" r="4" fill="#00d4aa"/>
  <circle cx="52" cy="98" r="4" fill="#00b4d8"/>
  <circle cx="80" cy="44" r="3" fill="#00d4aa"/>
  <circle cx="88" cy="84" r="3" fill="#00b4d8"/>

  <!-- 底部装饰线 -->
  <line x1="24" y1="108" x2="104" y2="108" stroke="#3a3a5a" stroke-width="2" stroke-linecap="round"/>
</svg>