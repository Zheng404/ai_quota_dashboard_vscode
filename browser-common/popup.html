<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; connect-src https://*.kimi.com https://*.xiaomimimo.com https://open.bigmodel.cn http://127.0.0.1:*; style-src 'self' 'unsafe-inline';">
  <title>AI Quota Dashboard</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Popup 专用覆盖样式 */
    body {
      width: 420px;
      max-height: 600px;
      overflow-y: auto;
      background: #f8f9fa;
      padding: 0;
    }
    .container {
      max-width: 100%;
      padding: 16px;
    }
    header {
      margin-bottom: 16px;
    }
    h1 {
      font-size: 16px;
    }
    .header-actions {
      gap: 6px;
    }
    .btn {
      padding: 5px 10px;
      font-size: 12px;
    }
    /* 缩小 GLM 图表 */
    .glm-chart-wrap {
      height: 80px;
    }
    /* 缩小汇总项 */
    .glm-summary-item {
      padding: 4px 6px;
      font-size: 10px;
    }
    /* 滚动条美化 */
    body::-webkit-scrollbar {
      width: 6px;
    }
    body::-webkit-scrollbar-track {
      background: transparent;
    }
    body::-webkit-scrollbar-thumb {
      background: #d1d5db;
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>📊 AI Quota</h1>
      <div class="header-actions">
        <button class="btn btn-secondary" id="btn-settings" title="设置">⚙️</button>
        <button class="btn btn-primary" id="btn-refresh">🔄</button>
      </div>
    </header>

    <div class="tabs">
      <button class="tab-btn active" data-tab="dashboard">仪表盘</button>
      <button class="tab-btn" data-tab="services">服务</button>
      <button class="tab-btn" data-tab="global">设置</button>
    </div>

    <div class="tab-panel active" id="panel-dashboard">
      <div id="services">
        <div class="empty-state">
          <p>加载中...</p>
        </div>
      </div>
    </div>

    <div class="tab-panel" id="panel-services"></div>
    <div class="tab-panel" id="panel-global"></div>

    <div class="footer" style="margin-top: 12px; padding-top: 10px;">
      <span style="font-size: 11px;">AI Quota Dashboard</span>
      <span class="last-update" id="last-update" style="font-size: 10px;"></span>
    </div>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
