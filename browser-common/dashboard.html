<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; connect-src https://*.kimi.com https://*.xiaomimimo.com https://open.bigmodel.cn http://127.0.0.1:*; style-src 'self' 'unsafe-inline';">
  <title>AI Quota Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>📊 AI Quota Dashboard</h1>
      <div class="header-actions">
        <button class="btn btn-secondary" id="btn-settings">⚙️ 设置</button>
        <button class="btn btn-primary" id="btn-refresh">🔄 刷新</button>
      </div>
    </header>

    <div class="tabs">
      <button class="tab-btn active" data-tab="dashboard">仪表盘</button>
      <button class="tab-btn" data-tab="services">服务</button>
      <button class="tab-btn" data-tab="global">设置</button>
    </div>

    <div class="tab-panel active" id="panel-dashboard">
      <div id="services">
        <div class="empty-state">
          <p>加载中...</p>
        </div>
      </div>
    </div>

    <div class="tab-panel" id="panel-services"></div>
    <div class="tab-panel" id="panel-global"></div>

    <div class="footer">
      <span>AI Quota Dashboard</span>
      <span class="last-update" id="last-update"></span>
    </div>
  </div>

  <script type="module" src="dashboard.js"></script>
</body>
</html>
